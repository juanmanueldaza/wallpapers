name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      # Ensure pictures directory exists in dist
      - name: Create pictures directory
        run: mkdir -p dist/pictures

      # Process images BEFORE build
      - name: Run Image Processing Script
        run: |
          chmod +x ./picture_processing.sh
          NODE_ENV=production ./picture_processing.sh

      - name: Build
        run: npm run build

      # Verify build output
      - name: List build output
        run: ls -la dist/pictures

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
